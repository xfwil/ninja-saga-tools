name: Auto Update Game Data

on:
  # Run every hour
  schedule:
    - cron: "0 * * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: Download data, diff, commit if changed ──────────────────────────
  update:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest game data from server
        run: node dump-game-data.mjs

      - name: Run changelog sync
        run: node scripts/sync-dump.js

      - name: Sync Shadow War rewards
        run: node scripts/sync-sw-rewards.js

      - name: Check for changes
        id: changes
        run: |
          git add dump/ data/snapshot.json public/data/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⏭  No changes — skipping commit."
          else
            CHANGED=$(git diff --cached --name-only | wc -l | tr -d ' ')
            SYNC_CHANGES=$(node -e "
              const fs = require('fs');
              try {
                const syncs = JSON.parse(fs.readFileSync('public/data/syncs.json','utf8'));
                const latest = syncs[0];
                process.stdout.write(latest ? String(latest.changes) : '0');
              } catch { process.stdout.write('0'); }
            ")
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
            echo "sync_changes=$SYNC_CHANGES" >> $GITHUB_OUTPUT
            echo "✅  $CHANGED file(s) changed, $SYNC_CHANGES game data change(s) detected."
          fi

      - name: Commit and push updated data
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): auto-update $(date -u +%Y-%m-%d) — ${{ steps.changes.outputs.sync_changes }} game change(s)"
          git push

  # ── Job 2: Rebuild & redeploy site only if data changed ────────────────────
  deploy:
    needs: update
    if: needs.update.outputs.has_changes == 'true'
    uses: ./.github/workflows/nextjs.yml
